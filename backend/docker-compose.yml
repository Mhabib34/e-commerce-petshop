services:
  postgres:
    image: postgres:16-alpine
    container_name: petshop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop123}
      POSTGRES_DB: ${POSTGRES_DB:-petshop_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petshop} -d ${POSTGRES_DB:-petshop_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: petshop_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-petshop}:${POSTGRES_PASSWORD:-petshop123}@postgres:5432/${POSTGRES_DB:-petshop_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changethis}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
